# Template: deploy workflow for sales-admin-rajani-group (Sales Admin panel).
#
# WHERE THIS FILE GOES
#   Copy to:  .github/workflows/deploy.yml  in the sales-admin-rajani-group repo.
#
# ONE-TIME SETUP IN THE FRONTEND REPO (Settings -> Environments)
#   1. Create two Environments:
#        - "dev"  (Deployment branches: main only)
#        - "prod" (main only; REQUIRED reviewers = write-access collaborators)
#   2. In EACH Environment add:
#
#      SECRET  AWS_DEPLOY_ROLE_ARN   (full ARN, from infra outputs)
#          dev:  Rajani-Dev-CiDeploy.SalesadminDeployRoleArn
#          prod: Rajani-Prod-CiDeploy.SalesadminDeployRoleArn   (when prod exists)
#
#      App build VARIABLES (VITE_* are compiled into the public bundle;
#      names must match what src/config/env.ts + vite.config.ts read):
#          VITE_APP_STAGE          dev: development           prod: production
#          VITE_APP_BASE_URL       dev: /                     prod: /
#          VITE_APP_API_URL        dev: https://api.dev.rajanigroup.in
#          VITE_APP_USER_TYPE      salesInchargeAdmin
#          VITE_USE_MOCK_API       false  (hit the real auth backend)
#          VITE_MAP_TILE_URL       https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png
#          VITE_FIREBASE_CONFIG    single-line JSON web-app config
#          VITE_FIREBASE_VAPID_KEY FCM Web Push (VAPID) key
#      App build SECRET:
#          VITE_APP_ENCRYPT_KEY    key used to encrypt persisted storage
#
#   The bucket + distribution id are read from the env's Assets stack outputs at
#   deploy time (the role has read-only cloudformation:DescribeStacks on it), so
#   nothing else is hardcoded or needs a variable.

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        required: true
        default: dev
        options:
          - dev
          - prod

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    timeout-minutes: 15

    env:
      AWS_REGION: ap-south-1
      ASSETS_OUTPUT_BUCKET_KEY: SalesadminBucketName
      ASSETS_OUTPUT_DISTRIBUTION_KEY: SalesadminDistributionId

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate .env file
        env:
          VITE_APP_STAGE: ${{ vars.VITE_APP_STAGE }}
          VITE_APP_BASE_URL: ${{ vars.VITE_APP_BASE_URL }}
          VITE_APP_API_URL: ${{ vars.VITE_APP_API_URL }}
          VITE_APP_USER_TYPE: ${{ vars.VITE_APP_USER_TYPE }}
          VITE_USE_MOCK_API: ${{ vars.VITE_USE_MOCK_API }}
          VITE_MAP_TILE_URL: ${{ vars.VITE_MAP_TILE_URL }}
          VITE_FIREBASE_CONFIG: ${{ vars.VITE_FIREBASE_CONFIG }}
          VITE_FIREBASE_VAPID_KEY: ${{ vars.VITE_FIREBASE_VAPID_KEY }}
          VITE_APP_ENCRYPT_KEY: ${{ secrets.VITE_APP_ENCRYPT_KEY }}
        run: |
          set -euo pipefail
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          if [ "$ENV" = "prod" ]; then MODE="production"; else MODE="development"; fi
          {
            echo "VITE_APP_STAGE=${VITE_APP_STAGE}"
            echo "VITE_APP_BASE_URL=${VITE_APP_BASE_URL}"
            echo "VITE_APP_ENCRYPT_KEY=${VITE_APP_ENCRYPT_KEY}"
            echo "VITE_APP_API_URL=${VITE_APP_API_URL}"
            echo "VITE_APP_USER_TYPE=${VITE_APP_USER_TYPE}"
            echo "VITE_USE_MOCK_API=${VITE_USE_MOCK_API}"
            echo "VITE_MAP_TILE_URL=${VITE_MAP_TILE_URL}"
            echo "VITE_FIREBASE_CONFIG=${VITE_FIREBASE_CONFIG}"
            echo "VITE_FIREBASE_VAPID_KEY=${VITE_FIREBASE_VAPID_KEY}"
          } > ".env.${MODE}"
          echo "Wrote .env.${MODE} for $ENV (values hidden)."

      - name: Build
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          if [ "$ENV" = "prod" ]; then npm run build:prod; else npm run build; fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve bucket and distribution from CFN outputs
        id: outputs
        run: |
          set -euo pipefail
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          if [ "$ENV" = "prod" ]; then PREFIX="Prod"; else PREFIX="Dev"; fi
          STACK="Rajani-${PREFIX}-Assets"

          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name "$STACK" \
            --query "Stacks[0].Outputs[?OutputKey=='${ASSETS_OUTPUT_BUCKET_KEY}'].OutputValue" \
            --output text)
          DIST=$(aws cloudformation describe-stacks \
            --stack-name "$STACK" \
            --query "Stacks[0].Outputs[?OutputKey=='${ASSETS_OUTPUT_DISTRIBUTION_KEY}'].OutputValue" \
            --output text)

          if [ -z "$BUCKET" ] || [ "$BUCKET" = "None" ] || [ -z "$DIST" ] || [ "$DIST" = "None" ]; then
            echo "::error::Could not resolve bucket or distribution from $STACK outputs."
            exit 1
          fi

          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"
          echo "distribution=$DIST" >> "$GITHUB_OUTPUT"
          echo "Bucket:       $BUCKET"
          echo "Distribution: $DIST"

      - name: Sync hashed assets (long cache)
        run: |
          aws s3 sync dist/assets/ "s3://${{ steps.outputs.outputs.bucket }}/assets/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable"

      - name: Sync index.html and root files (short cache)
        run: |
          aws s3 sync dist/ "s3://${{ steps.outputs.outputs.bucket }}/" \
            --delete \
            --exclude "assets/*" \
            --cache-control "public, max-age=300, must-revalidate"

      - name: Invalidate CloudFront cache for index
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.outputs.outputs.distribution }}" \
            --paths "/index.html" "/"
