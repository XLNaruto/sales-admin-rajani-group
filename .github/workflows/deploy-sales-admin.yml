# Template: deploy workflow for sales-admin-rajani-group (Sales Admin panel).
#
# WHERE THIS FILE GOES
#   Copy to:  .github/workflows/deploy.yml  in the sales-admin-rajani-group repo.
#
# ONE-TIME SETUP IN THE FRONTEND REPO (Settings -> Environments)
#   1. Create two Environments:
#        - "dev"  (Deployment branches: main only)
#        - "prod" (main only; REQUIRED reviewers = write-access collaborators)
#   2. In EACH Environment add:
#
#      SECRET  AWS_DEPLOY_ROLE_ARN
#        Full ARN from the infra outputs:
#          dev:  Rajani-Dev-CiDeploy.SalesadminDeployRoleArn
#          prod: Rajani-Prod-CiDeploy.SalesadminDeployRoleArn   (when prod exists)
#
#      VARIABLE  CLOUDFRONT_DISTRIBUTION_ID
#        The distribution id (random, so it can't be derived) from:
#          dev:  Rajani-Dev-Assets.SalesadminDistributionId
#          prod: Rajani-Prod-Assets.SalesadminDistributionId
#        (The S3 bucket name is NOT needed — it's derived as
#         rajani-group-<account>-<env>-sales-admin, matching AssetsStack.)
#
#      App build VARIABLES (VITE_* are compiled into the public bundle):
#          VITE_APP_ENV            dev: development           prod: production
#          APP_BASE_PATH           dev: /                     prod: /
#          VITE_API_URL            dev: https://api.dev.rajanigroup.in
#          VITE_APP_NAME           Sales Admin Panel
#          VITE_MAP_TILE_URL       https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png
#          VITE_FIREBASE_CONFIG    single-line JSON web-app config
#          VITE_FIREBASE_VAPID_KEY FCM Web Push (VAPID) key
#      App build SECRET:
#          VITE_STORAGE_SECRET     key used to encrypt persisted storage
#
# WHAT IT DOES
#   - Push to main       -> auto-deploys to dev.
#   - workflow_dispatch  -> deploys to dev or prod (prod prompts approvers).
#   - Uses ONLY S3 (sync) + CloudFront (invalidate) — no cloudformation:* — so
#     the least-privilege CiDeploy role works unchanged.

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        required: true
        default: dev
        options:
          - dev
          - prod

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    timeout-minutes: 15

    env:
      AWS_REGION: ap-south-1
      # Panel key — matches the S3 bucket suffix created by AssetsStack.
      PANEL_KEY: sales-admin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate .env file
        env:
          VITE_APP_ENV: ${{ vars.VITE_APP_ENV }}
          APP_BASE_PATH: ${{ vars.APP_BASE_PATH }}
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_APP_NAME: ${{ vars.VITE_APP_NAME }}
          VITE_MAP_TILE_URL: ${{ vars.VITE_MAP_TILE_URL }}
          VITE_FIREBASE_CONFIG: ${{ vars.VITE_FIREBASE_CONFIG }}
          VITE_FIREBASE_VAPID_KEY: ${{ vars.VITE_FIREBASE_VAPID_KEY }}
          VITE_STORAGE_SECRET: ${{ secrets.VITE_STORAGE_SECRET }}
        run: |
          set -euo pipefail
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          if [ "$ENV" = "prod" ]; then MODE="production"; else MODE="development"; fi
          {
            echo "VITE_APP_ENV=${VITE_APP_ENV}"
            echo "APP_BASE_PATH=${APP_BASE_PATH}"
            echo "VITE_STORAGE_SECRET=${VITE_STORAGE_SECRET}"
            echo "VITE_API_URL=${VITE_API_URL}"
            echo "VITE_APP_NAME=${VITE_APP_NAME}"
            echo "VITE_MAP_TILE_URL=${VITE_MAP_TILE_URL}"
            echo "VITE_FIREBASE_CONFIG=${VITE_FIREBASE_CONFIG}"
            echo "VITE_FIREBASE_VAPID_KEY=${VITE_FIREBASE_VAPID_KEY}"
          } > ".env.${MODE}"
          echo "Wrote .env.${MODE} for $ENV (values hidden)."

      - name: Build
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          if [ "$ENV" = "prod" ]; then npm run build:prod; else npm run build:dev; fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve bucket + distribution (no CloudFormation needed)
        id: outputs
        run: |
          set -euo pipefail
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          # Bucket is deterministic: AssetsStack names it
          # rajani-group-<account>-<env>-<panel>. No CFN lookup needed.
          BUCKET="rajani-group-${ACCOUNT}-${ENV}-${PANEL_KEY}"
          # Distribution id is random -> comes from a GitHub Environment variable.
          DIST="${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}"
          if [ -z "$DIST" ]; then
            echo "::error::Set the CLOUDFRONT_DISTRIBUTION_ID variable in this GitHub Environment (infra output Rajani-<Env>-Assets.SalesadminDistributionId)."
            exit 1
          fi
          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"
          echo "distribution=$DIST" >> "$GITHUB_OUTPUT"
          echo "Bucket:       $BUCKET"
          echo "Distribution: $DIST"

      - name: Sync hashed assets (long cache)
        run: |
          aws s3 sync dist/assets/ "s3://${{ steps.outputs.outputs.bucket }}/assets/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable"

      - name: Sync index.html and root files (short cache)
        run: |
          aws s3 sync dist/ "s3://${{ steps.outputs.outputs.bucket }}/" \
            --delete \
            --exclude "assets/*" \
            --cache-control "public, max-age=300, must-revalidate"

      - name: Invalidate CloudFront cache for index
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.outputs.outputs.distribution }}" \
            --paths "/index.html" "/"
